name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Lint is currently advisory — there are pre-existing react-hooks/preserve-manual-memoization
      # findings from the React Compiler upgrade. Flip continue-on-error to false once those are cleared.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
